<div class="app-shell" [class.app-shell--navbar-collapsed]="isNavbarCollapsed()">
  <app-navbar
    [collapsed]="isNavbarCollapsed()"
    (collapsedChange)="setNavbarCollapsed($event)"
  />

  <main class="app-shell__content" aria-label="Page content">
    <app-intro-section />
    <app-about-section />
    <app-skills-section />
    <app-projects-technologies-section />
    <app-contact-section />
  </main>
</div>
