<nav class="side-navbar" [class.side-navbar--collapsed]="collapsed" aria-label="Primary">
  <div class="side-navbar__header">
    <a
      class="side-navbar__brand"
      href="#intro"
      [attr.aria-label]="collapsed ? 'AAVerse' : null"
    >
      <span class="side-navbar__brand-mark">AAV</span>
      <span class="side-navbar__brand-rest">erse</span>
    </a>

    <button
      class="side-navbar__toggle"
      type="button"
      (click)="toggleNavbar()"
      [attr.aria-label]="collapsed ? 'Expand navigation' : 'Collapse navigation'"
      [attr.aria-expanded]="!collapsed"
    >
      <span class="side-navbar__toggle-icon" aria-hidden="true"></span>
    </button>
  </div>

  <ul class="side-navbar__links">
    @for (item of navItems; track item.href) {
      <li>
        <a
          class="side-navbar__link"
          [href]="item.href"
          [attr.aria-label]="item.label"
        >
          <span class="side-navbar__link-short" aria-hidden="true">{{ item.shortLabel }}</span>
          <span class="side-navbar__link-label">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>

  <div class="side-navbar__footer">
    <button
      class="side-navbar__link side-navbar__theme-toggle"
      type="button"
      (click)="toggleTheme()"
      [attr.aria-label]="darkTheme ? 'Switch to light theme' : 'Switch to dark theme'"
      [attr.aria-pressed]="darkTheme"
      [attr.title]="darkTheme ? 'Switch to light theme' : 'Switch to dark theme'"
    >
      <span
        class="side-navbar__theme-icon"
        style="display: inline-block"
        [style.transform]="darkTheme ? null : 'rotate(-18deg)'"
        aria-hidden="true"
      >
        @if (darkTheme) {
          &#9728;
        } @else {
          &#9790;
        }
      </span>
    </button>
  </div>
</nav>
